<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>word→site | Sites</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Geist:wght@400;450;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/wts.css?v=2">
    <style>
        .dialog-overlay { display: none; position: fixed; inset: 0; background: rgba(14,14,12,0.45); z-index: 300; align-items: center; justify-content: center; }
        .dialog-overlay.open { display: flex; }
        .dialog { background: var(--surface); border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow-md); padding: 24px; max-width: 420px; width: 90%; }
        .empty-card { text-align: center; padding: 64px 24px; background: var(--surface); border: 1px dashed var(--line-2); border-radius: 8px; }
        .empty-icon { width: 48px; height: 48px; margin: 0 auto 16px; background: var(--bg-3); border-radius: 8px; display: grid; place-items: center; color: var(--muted); }
        .loading-state { text-align: center; padding: 60px; color: var(--muted); font-size: 14px; }
    </style>
</head>
<body class="wts">
<div class="wts-shell">
    <div id="wts-sidebar-mount"></div>

    <div class="wts-shell-main">
        <div class="wts-top">
            <div class="wts-crumbs">
                <span id="crumbUser">Account</span>
                <span class="sep">/</span>
                <b>Sites</b>
            </div>
            <div style="display:flex; align-items:center; gap:10px;">
                <a class="wts-btn primary" href="/app.html">
                    <span class="ico"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 3v10M3 8h10"/></svg></span>
                    New site
                </a>
            </div>
        </div>

        <div class="wts-content">
            <div class="loading-state" id="loadingState">Loading…</div>

            <div id="content" style="display:none; padding:32px 36px 60px; max-width:1280px; margin:0 auto;">
                <div style="display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:28px;">
                    <div>
                        <h1 class="wts-page-title">Sites</h1>
                        <p class="wts-page-lede" id="sitesSummary">Loading…</p>
                    </div>
                </div>

                <div id="sitesList"></div>

                <div id="emptyState" class="empty-card" style="display:none">
                    <div class="empty-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
                    </div>
                    <h2 class="wts-page-sub" style="font-size:18px;">No sites yet</h2>
                    <p style="font-size:13.5px; color:var(--muted); margin:8px 0 20px;">Create your first website in under 90 seconds.</p>
                    <a class="wts-btn primary" href="/app.html">
                        <span class="ico"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 3v10M3 8h10"/></svg></span>
                        Create your first site
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="dialog-overlay" id="deleteDialog">
    <div class="dialog">
        <h3 class="wts-page-sub" style="font-size:16px; margin-bottom:8px;">Delete site?</h3>
        <p style="font-size:13px; color:var(--muted); line-height:1.5; margin-bottom:20px;">This will remove the site from your dashboard. The WordPress instance will remain active.</p>
        <div style="display:flex; gap:8px; justify-content:flex-end;">
            <button class="wts-btn" id="cancelDelete">Cancel</button>
            <button class="wts-btn danger" id="confirmDelete">Delete</button>
        </div>
    </div>
</div>

<script src="/assets/wts-platform.js"></script>
<script>
let deletingSiteId = null;
let allSites = [];
let activeFilter = 'all';

WtsPlatform.init({ active: 'sites' }).then(loadSites).catch(() => {});

async function loadSites() {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('content').style.display = '';

    try {
        const res = await fetch('/api/sites');
        const data = await res.json();
        allSites = data.sites || [];
        renderSites();
    } catch {
        document.getElementById('sitesList').innerHTML = '<div class="wts-card" style="padding:24px; text-align:center; color:var(--danger);">Failed to load sites</div>';
    }
}

function renderSites() {
    const counts = {
        all: allSites.length,
        active: allSites.filter(s => s.status === 'active').length,
        provisioning: allSites.filter(s => s.status === 'provisioning').length,
        deleted: allSites.filter(s => s.status === 'deleted').length,
    };

    document.getElementById('sitesSummary').textContent =
        `${counts.all} site${counts.all !== 1 ? 's' : ''} · ${counts.active} live · ${counts.provisioning} provisioning · ${counts.deleted} archived`;
    const sidebarCount = document.getElementById('sidebarCount');
    if (sidebarCount) sidebarCount.textContent = counts.all || '';

    if (allSites.length === 0) {
        document.getElementById('emptyState').style.display = '';
        document.getElementById('sitesList').innerHTML = '';
        return;
    }
    document.getElementById('emptyState').style.display = 'none';

    const filtered = activeFilter === 'all'
        ? allSites
        : allSites.filter(s => s.status === activeFilter);

    const rows = filtered.map(site => renderSiteRow(site)).join('');

    document.getElementById('sitesList').innerHTML = `
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:18px;">
            <div class="wts-tabs">
                <button class="wts-tab ${activeFilter==='all'?'active':''}" data-filter="all">All <span class="count">${counts.all}</span></button>
                <button class="wts-tab ${activeFilter==='active'?'active':''}" data-filter="active">Live <span class="count">${counts.active}</span></button>
                <button class="wts-tab ${activeFilter==='provisioning'?'active':''}" data-filter="provisioning">Provisioning <span class="count">${counts.provisioning}</span></button>
                <button class="wts-tab ${activeFilter==='deleted'?'active':''}" data-filter="deleted">Archived <span class="count">${counts.deleted}</span></button>
            </div>
        </div>

        <div class="wts-card">
            <div class="wts-card-head">
                <div class="wts-card-title">Your sites</div>
                <div style="display:flex; gap:12px; align-items:center; font-size:12px; color:var(--muted);">
                    <span>Sort: <b style="color:var(--ink); font-weight:500;">Last updated</b> ↓</span>
                </div>
            </div>
            ${filtered.length === 0 ? `
                <div style="padding:48px 24px; text-align:center; color:var(--muted-2); font-size:13.5px;">No sites in this filter.</div>
            ` : `
                <table class="wts-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Type</th>
                            <th>Status</th>
                            <th>Created</th>
                            <th style="width:1%; white-space:nowrap;"></th>
                        </tr>
                    </thead>
                    <tbody>
                        ${rows}
                    </tbody>
                </table>
            `}
        </div>
    `;

    document.querySelectorAll('[data-filter]').forEach(btn => {
        btn.addEventListener('click', () => {
            activeFilter = btn.dataset.filter;
            renderSites();
        });
    });
}

function tryParseUrl(value) {
    if (typeof value !== 'string' || !value.trim()) return null;
    const protocolRegExp = new RegExp(/^https?:\/\//i);
    const full = protocolRegExp.test(value) ? value.trim() : `https://${value.trim()}`;
    try { return new URL(full); } catch { return null; }
}

function siteBaseUrl(site) {
    const wp = tryParseUrl(site.wp_url);
    const custom = tryParseUrl(site.domain);
    const customIsSlugOfWp = custom && wp && wp.hostname.startsWith(`${custom.hostname}.`);
    if (custom && !customIsSlugOfWp) return custom.origin;
    return wp ? wp.origin : '';
}

const SITE_COLORS = ['#3F3D3A', '#8B5A2B', '#1F5240', '#2A3050', '#7A7A72', '#5A4B6E'];
function colorForSite(site) {
    let hash = 0;
    const key = (site.id || site.site_name || '').toString();
    for (let i = 0; i < key.length; i++) hash = (hash * 31 + key.charCodeAt(i)) >>> 0;
    return SITE_COLORS[hash % SITE_COLORS.length];
}

function siteInitials(name) {
    return (name || 'NA')
        .split(/\s+/)
        .map(w => w[0]?.toUpperCase() || '')
        .filter(Boolean)
        .slice(0, 2)
        .join('') || 'NA';
}

function statusBadge(status) {
    if (status === 'active') return '<span class="wts-badge live"><span class="dot"></span>Live</span>';
    if (status === 'provisioning') return '<span class="wts-badge draft"><span class="dot"></span>Provisioning</span>';
    if (status === 'deleted') return '<span class="wts-badge archived"><span class="dot"></span>Archived</span>';
    return `<span class="wts-badge archived"><span class="dot"></span>${escapeHtml(status || 'Unknown')}</span>`;
}

function renderSiteRow(site) {
    const displayUrl = site.domain || site.wp_url || '';
    const baseUrl = siteBaseUrl(site);
    const editorUrl = `/editor.html?site=${site.id}`;
    const created = new Date(site.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    const inits = siteInitials(site.site_name);
    const color = colorForSite(site);

    return `
        <tr data-id="${site.id}">
            <td>
                <div style="display:flex; align-items:center; gap:12px;">
                    <div style="width:30px; height:30px; background:${color}; border-radius:5px; color:var(--bg); display:grid; place-items:center; font-size:11px; font-weight:600; flex-shrink:0;">${escapeHtml(inits)}</div>
                    <div style="min-width:0;">
                        <div style="font-weight:500; font-size:13.5px;">${escapeHtml(site.site_name || 'Untitled site')}</div>
                        <div class="wts-mono" style="font-size:11.5px; color:var(--muted-2); margin-top:1px;">${escapeHtml(displayUrl)}</div>
                    </div>
                </div>
            </td>
            <td style="color:var(--muted);">${escapeHtml(site.template_slug || site.onboard_type || '—')}</td>
            <td>${statusBadge(site.status)}</td>
            <td style="color:var(--muted);">${created}</td>
            <td style="text-align:right; white-space:nowrap;">
                ${baseUrl ? `<a class="wts-btn ghost" href="${escapeHtml(baseUrl)}" target="_blank" rel="noopener" style="height:26px; padding:0 10px; font-size:12px;">Visit ↗</a>` : ''}
                <a class="wts-btn ghost" href="${escapeHtml(editorUrl)}" style="height:26px; padding:0 10px; font-size:12px;">Open</a>
                <button class="wts-btn ghost" onclick="openDelete('${site.id}')" style="height:26px; padding:0 8px; font-size:12px; color:var(--danger);">Delete</button>
            </td>
        </tr>`;
}

function escapeHtml(str) {
    if (str === null || str === undefined) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function openDelete(siteId) {
    deletingSiteId = siteId;
    document.getElementById('deleteDialog').classList.add('open');
}

document.getElementById('cancelDelete').addEventListener('click', () => {
    document.getElementById('deleteDialog').classList.remove('open');
    deletingSiteId = null;
});

document.getElementById('confirmDelete').addEventListener('click', async () => {
    if (!deletingSiteId) return;
    try {
        await fetch(`/api/sites/${deletingSiteId}`, { method: 'DELETE' });
        document.getElementById('deleteDialog').classList.remove('open');
        deletingSiteId = null;
        loadSites();
    } catch {
        alert('Failed to delete site');
    }
});
</script>
</body>
</html>
