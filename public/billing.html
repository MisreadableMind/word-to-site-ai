<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>word→site | Billing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Geist:wght@400;450;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/wts.css?v=2">
    <style>
        .banner { padding: 12px 14px; border-radius: var(--r-md); font-size: 13px; margin-bottom: 20px; display: none; }
        .banner.success { display: block; background: rgba(26,127,63,0.08); color: var(--success); border: 1px solid rgba(26,127,63,0.2); }
        .banner.warn { display: block; background: rgba(184,110,0,0.08); color: var(--warn); border: 1px solid rgba(184,110,0,0.2); }
        .banner.error { display: block; background: rgba(180,35,24,0.06); color: var(--danger); border: 1px solid rgba(180,35,24,0.2); }
    </style>
</head>
<body class="wts">
<div class="wts-shell">
    <div id="wts-sidebar-mount"></div>

    <div class="wts-shell-main">
        <div class="wts-top">
            <div class="wts-crumbs">
                <span id="crumbUser">Account</span>
                <span class="sep">/</span>
                <span>Account</span>
                <span class="sep">/</span>
                <b>Billing</b>
            </div>
            <div style="display:flex; gap:8px; align-items:center;">
                <button class="wts-btn" id="portalBtn">Manage subscription</button>
            </div>
        </div>

        <div class="wts-content">
            <div class="account-subnav">
                <div class="account-subnav-inner">
                    <a href="/profile.html">Profile</a>
                    <a href="/billing.html" class="active">Billing</a>
                    <a href="/usage.html">Usage</a>
                    <a href="/pricing.html">Plans</a>
                </div>
            </div>

            <div style="padding: 32px 36px 60px; max-width: 1080px;">
                <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:24px; gap:24px;">
                    <div>
                        <h1 class="wts-page-title">Billing</h1>
                        <p class="wts-page-lede">Plan, payment, and invoice history.</p>
                    </div>
                    <div class="wts-card" style="padding:14px 20px; min-width:260px;" id="nextChargeCard">
                        <div style="font-size:11.5px; color:var(--muted-2); text-transform:uppercase; letter-spacing:0.04em;">Next charge</div>
                        <div style="display:flex; align-items:baseline; gap:6px; margin-top:2px;">
                            <div class="wts-serif" style="font-size:28px;" id="nextChargeAmount">—</div>
                            <span style="font-size:12px; color:var(--muted);" id="nextChargeDate"></span>
                        </div>
                    </div>
                </div>

                <div class="banner" id="banner"></div>

                <div class="wts-card" style="margin-bottom:16px;">
                    <div class="wts-card-head">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <span class="wts-card-title">Current plan</span>
                            <span class="wts-badge" id="statusBadge"><span class="dot"></span><span id="statusBadgeText">—</span></span>
                        </div>
                        <div style="display:flex; gap:6px;">
                            <a class="wts-btn" href="/pricing.html" id="upgradeBtn">Change plan</a>
                        </div>
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr 1fr 1fr;">
                        <div style="padding:18px 20px; border-right:1px solid var(--line);">
                            <div style="font-size:11.5px; color:var(--muted-2); text-transform:uppercase; letter-spacing:0.04em;">Plan</div>
                            <div class="wts-serif" style="font-size:22px; margin-top:4px;" id="planName">—</div>
                            <div style="font-size:12px; color:var(--muted); margin-top:2px;" id="planLabel"></div>
                        </div>
                        <div style="padding:18px 20px; border-right:1px solid var(--line);">
                            <div style="font-size:11.5px; color:var(--muted-2); text-transform:uppercase; letter-spacing:0.04em;">Sites</div>
                            <div class="wts-serif" style="font-size:22px; margin-top:4px;" id="sitesUsed">—</div>
                            <div style="font-size:12px; color:var(--muted); margin-top:2px;" id="sitesUsedHint">included</div>
                        </div>
                        <div style="padding:18px 20px; border-right:1px solid var(--line);">
                            <div style="font-size:11.5px; color:var(--muted-2); text-transform:uppercase; letter-spacing:0.04em;">AI tokens / mo</div>
                            <div class="wts-serif" style="font-size:22px; margin-top:4px;" id="tokenLimit">—</div>
                            <div style="font-size:12px; color:var(--muted); margin-top:2px;">monthly allowance</div>
                        </div>
                        <div style="padding:18px 20px;" id="renewsCol">
                            <div style="font-size:11.5px; color:var(--muted-2); text-transform:uppercase; letter-spacing:0.04em;" id="renewsLabel">Renews</div>
                            <div class="wts-serif" style="font-size:22px; margin-top:4px;" id="periodEnd">—</div>
                            <div style="font-size:12px; color:var(--muted); margin-top:2px;" id="renewsHint"></div>
                        </div>
                    </div>
                </div>

                <div class="wts-card">
                    <div class="wts-card-head">
                        <span class="wts-card-title">Invoice history</span>
                    </div>
                    <div id="invoicesContainer" style="padding:18px; font-size:13px; color:var(--muted);">Loading…</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/assets/wts-platform.js"></script>
<script>
WtsPlatform.init({ active: 'billing' }).then(load).catch(() => {});

async function load() {
    const params = new URLSearchParams(location.search);
    if (params.get('status') === 'success') {
        showBanner('success', 'Subscription updated. It may take a moment for the new plan to appear here.');
    }

    try {
        const res = await fetch('/api/billing/subscription');
        if (!res.ok) {
            if (res.status === 404) {
                showBanner('warn', 'Billing is not enabled on this deployment.');
                return;
            }
            throw new Error('Failed to load billing');
        }
        const data = await res.json();
        renderSubscription(data);
    } catch (err) {
        showBanner('error', err.message);
    }

    try {
        const res = await fetch('/api/billing/invoices');
        if (res.ok) {
            renderInvoices((await res.json()).invoices);
        } else {
            document.getElementById('invoicesContainer').textContent = 'No invoices yet.';
        }
    } catch {
        document.getElementById('invoicesContainer').textContent = 'Could not load invoices.';
    }
}

function renderSubscription(data) {
    const ent = data.entitlements;
    const sub = data.subscription;

    document.getElementById('planName').textContent = ent.label || data.planTier;
    document.getElementById('planLabel').textContent = sub && sub.priceLabel ? sub.priceLabel : (data.planTier || 'free').toUpperCase();
    document.getElementById('sitesUsed').textContent = `${data.usage.sitesUsed} / ${ent.maxSites}`;
    document.getElementById('sitesUsedHint').textContent = `${Math.max(0, ent.maxSites - data.usage.sitesUsed)} remaining`;
    document.getElementById('tokenLimit').textContent = (ent.monthlyTokens || 0).toLocaleString();

    const statusBadge = document.getElementById('statusBadge');
    const statusText = document.getElementById('statusBadgeText');
    if (sub) {
        statusText.textContent = sub.status;
        statusBadge.className = 'wts-badge ' + (sub.status === 'active' ? 'live' : sub.status === 'past_due' || sub.status === 'canceled' ? 'draft' : '');
        const dot = statusBadge.querySelector('.dot');
        if (!dot) statusBadge.insertAdjacentHTML('afterbegin', '<span class="dot"></span>');

        if (sub.currentPeriodEnd) {
            const date = new Date(sub.currentPeriodEnd);
            document.getElementById('periodEnd').textContent = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            document.getElementById('renewsLabel').textContent = sub.cancelAtPeriodEnd ? 'Ends' : 'Renews';
            const days = Math.max(0, Math.round((date - Date.now()) / 86400000));
            document.getElementById('renewsHint').textContent = `${days} day${days !== 1 ? 's' : ''} from now`;
            const amount = sub.upcomingAmount ? `$${(sub.upcomingAmount / 100).toFixed(2)}` : '—';
            document.getElementById('nextChargeAmount').textContent = amount;
            document.getElementById('nextChargeDate').textContent = `on ${date.toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' })}`;
        }
        if (sub.status === 'past_due') {
            showBanner('warn', 'A recent payment failed. Update your payment method via "Manage subscription" to avoid losing access.');
        }
        if (sub.cancelAtPeriodEnd) {
            showBanner('warn', 'Your subscription is set to cancel at the end of the current period.');
        }
    } else {
        statusText.textContent = 'Free';
        statusBadge.className = 'wts-badge archived';
        const dot = statusBadge.querySelector('.dot');
        if (!dot) statusBadge.insertAdjacentHTML('afterbegin', '<span class="dot"></span>');
        document.getElementById('portalBtn').style.display = 'none';
        document.getElementById('renewsLabel').textContent = 'Renews';
        document.getElementById('periodEnd').textContent = '—';
        document.getElementById('renewsHint').textContent = 'No active subscription';
        document.getElementById('nextChargeCard').style.display = 'none';
    }
}

function renderInvoices(invoices) {
    const el = document.getElementById('invoicesContainer');
    if (!invoices || invoices.length === 0) {
        el.textContent = 'No invoices yet.';
        return;
    }
    const rows = invoices.map(inv => {
        const date = new Date(inv.created * 1000).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        const amount = (inv.amountPaid / 100).toFixed(2);
        const statusClass = inv.status === 'paid' ? 'live' : 'draft';
        const link = inv.hostedInvoiceUrl ? `<a class="wts-btn ghost" href="${inv.hostedInvoiceUrl}" target="_blank" rel="noopener" style="height:24px; padding:0 8px; font-size:11.5px;">View</a>` : '';
        const pdf = inv.invoicePdf ? `<a class="wts-btn ghost" href="${inv.invoicePdf}" target="_blank" rel="noopener" style="height:24px; padding:0 8px; font-size:11.5px;">PDF</a>` : '';
        return `<tr>
            <td class="num">${date}</td>
            <td>${escapeHtml(inv.number || inv.id)}</td>
            <td class="num" style="text-align:right;">$${amount} ${escapeHtml(inv.currency.toUpperCase())}</td>
            <td><span class="wts-badge ${statusClass}"><span class="dot"></span>${escapeHtml(inv.status)}</span></td>
            <td style="text-align:right; white-space:nowrap;">${link} ${pdf}</td>
        </tr>`;
    }).join('');
    el.innerHTML = `<table class="wts-table">
        <thead><tr><th>Date</th><th>Number</th><th style="text-align:right;">Amount</th><th>Status</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
    </table>`;
    el.style.padding = '0';
}

function showBanner(type, text) {
    const el = document.getElementById('banner');
    el.className = `banner ${type}`;
    el.textContent = text;
}

function escapeHtml(str) {
    if (str === null || str === undefined) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('portalBtn').addEventListener('click', async () => {
    const btn = document.getElementById('portalBtn');
    btn.disabled = true;
    try {
        const res = await fetch('/api/billing/portal', { method: 'POST' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error?.message || 'Failed');
        location.href = data.url;
    } catch (err) {
        showBanner('error', err.message);
        btn.disabled = false;
    }
});
</script>
</body>
</html>
