<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>WordToSite | Domains</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #FFFDF7; --bg-subtle: #FFF8F0;
            --surface: #FFFFFF; --surface-hover: #FFF5EC;
            --border: rgba(140, 120, 100, 0.18); --border-hover: rgba(140, 120, 100, 0.30);
            --text: #2D2926; --text-secondary: #4A4540; --text-muted: #8A8580;
            --accent: #6C5CE7; --accent-bright: #5A4BD1; --accent-dim: rgba(108,92,231,0.10);
            --green: #16A34A; --green-dim: rgba(22,163,74,0.12);
            --warn: #B45309; --warn-dim: rgba(180,83,9,0.08);
            --error: #DC2626; --error-dim: rgba(220,38,38,0.06);
            --shadow-sm: 0 1px 3px rgba(140,120,100,0.08), 0 1px 2px rgba(140,120,100,0.06);
            --radius: 12px; --radius-sm: 8px;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
        .grid-bg { position: fixed; inset: 0; background-image: linear-gradient(rgba(0,0,0,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.025) 1px, transparent 1px); background-size: 64px 64px; pointer-events: none; z-index: 0; }
        .grid-bg::after { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(108,92,231,0.08), transparent); }
        .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(255,253,247,0.8); backdrop-filter: blur(16px) saturate(1.2); -webkit-backdrop-filter: blur(16px) saturate(1.2); border-bottom: 1px solid var(--border); }
        .nav-inner { max-width: 880px; margin: 0 auto; padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
        .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); font-weight: 700; font-size: 15px; }
        .nav-logo { width: 28px; height: 28px; background: linear-gradient(135deg, #6C5CE7, #5A4BD1); border-radius: 7px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 12px rgba(108,92,231,0.3); }
        .nav-logo svg { width: 15px; height: 15px; }
        .nav-right { display: flex; align-items: center; gap: 12px; }
        .nav-link { font-size: 13px; font-weight: 500; color: var(--text-muted); padding: 6px 12px; border-radius: 6px; transition: all 150ms; text-decoration: none; }
        .nav-link:hover { color: var(--text-secondary); background: var(--accent-dim); }
        .main { position: relative; z-index: 1; max-width: 880px; margin: 0 auto; padding: 92px 24px 60px; }
        .main h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 28px; }
        .section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-sm); padding: 24px; margin-bottom: 20px; }
        .section h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
        .row { display: flex; gap: 10px; }
        .form-input { flex: 1; padding: 10px 14px; font-family: inherit; font-size: 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); outline: none; transition: border-color 150ms; }
        .form-input:focus { border-color: var(--accent); }
        .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px; font-family: inherit; font-size: 13px; font-weight: 600; border-radius: var(--radius-sm); cursor: pointer; transition: all 150ms; border: 1px solid var(--border); background: var(--surface); color: var(--text-secondary); text-decoration: none; }
        .btn:hover { border-color: var(--border-hover); background: var(--surface-hover); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
        .btn-primary:hover { background: var(--accent-bright); }
        .quote { margin-top: 16px; padding: 16px; border-radius: var(--radius-sm); background: var(--bg-subtle); border: 1px solid var(--border); display: none; }
        .quote.shown { display: block; }
        .quote-row { display: flex; justify-content: space-between; font-size: 14px; padding: 4px 0; }
        .quote-row.total { font-weight: 700; border-top: 1px solid var(--border); margin-top: 8px; padding-top: 10px; }
        .quote-row .muted { color: var(--text-muted); }
        .banner { padding: 12px 14px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 16px; display: none; }
        .banner.shown { display: block; }
        .banner.success { background: var(--green-dim); color: var(--green); border: 1px solid rgba(22,163,74,0.15); }
        .banner.warn { background: var(--warn-dim); color: var(--warn); border: 1px solid rgba(180,83,9,0.15); }
        .banner.error { background: var(--error-dim); color: var(--error); border: 1px solid rgba(220,38,38,0.15); }
        .banner.info { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(108,92,231,0.15); }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        table th, table td { text-align: left; padding: 10px 8px; border-bottom: 1px solid var(--border); }
        table th { font-weight: 600; color: var(--text-muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.4px; }
        .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase; }
        .badge-registered { background: var(--green-dim); color: var(--green); }
        .badge-awaiting_payment, .badge-registering { background: var(--accent-dim); color: var(--accent); }
        .badge-failed { background: var(--error-dim); color: var(--error); }
        .muted { color: var(--text-muted); font-size: 13px; }
    </style>
</head>
<body>
<div class="grid-bg"></div>

<nav class="nav">
    <div class="nav-inner">
        <a class="nav-brand" href="/">
            <div class="nav-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
            </div>
            <span>WordToSite</span>
        </a>
        <div class="nav-right">
            <a class="nav-link" href="/dashboard.html">Dashboard</a>
            <a class="nav-link" href="/billing.html">Billing</a>
        </div>
    </div>
</nav>

<div class="main">
    <h1>Domains</h1>
    <p class="subtitle">Register a custom domain for your site. You pay Namecheap's wholesale price plus a 20% service fee — no recurring platform charge for the domain itself.</p>

    <div class="banner" id="banner"></div>

    <div class="section">
        <h2>Add a custom domain</h2>
        <div class="row">
            <input class="form-input" id="domainInput" placeholder="example.com" autocomplete="off" spellcheck="false">
            <button class="btn" id="quoteBtn">Check price</button>
        </div>
        <div class="quote" id="quote"></div>
    </div>

    <div class="section">
        <h2>Your domains</h2>
        <div id="domainsList" class="muted">Loading…</div>
    </div>
</div>

<script>
let currentUser = null;
let currentQuote = null;

async function checkAuth() {
    const res = await fetch('/api/auth/me');
    if (!res.ok) { location.href = '/login.html'; return false; }
    currentUser = (await res.json()).user;
    return true;
}

function showBanner(type, text) {
    const el = document.getElementById('banner');
    el.className = `banner shown ${type}`;
    el.textContent = text;
}

function hideBanner() {
    document.getElementById('banner').className = 'banner';
}

async function showSessionResult(sessionId) {
    try {
        const res = await fetch(`/api/domains/by-session/${encodeURIComponent(sessionId)}`);
        if (!res.ok) {
            showBanner('info', 'Looking up your purchase…');
            setTimeout(() => showSessionResult(sessionId), 2000);
            return;
        }
        const { domain } = await res.json();
        if (domain.status === 'awaiting_payment' || domain.status === 'registering') {
            showBanner('info', `Setting up ${domain.domain} — refreshing in a few seconds…`);
            setTimeout(() => showSessionResult(sessionId), 3000);
            return;
        }
        if (domain.status === 'registered') {
            showBanner('success', `${domain.domain} is registered. It can now be mapped to one of your sites.`);
        } else if (domain.status === 'failed') {
            showBanner('error', `Registration failed: ${domain.errorMessage || 'unknown error'}. Your payment was refunded.`);
        }
        await loadDomains();
    } catch (err) {
        showBanner('error', err.message || 'Status lookup failed');
    }
}

async function getQuote() {
    hideBanner();
    currentQuote = null;
    const quoteEl = document.getElementById('quote');
    quoteEl.className = 'quote';
    const domain = document.getElementById('domainInput').value.trim().toLowerCase();
    if (!domain) return;

    const btn = document.getElementById('quoteBtn');
    btn.disabled = true;
    btn.textContent = 'Checking…';
    try {
        const res = await fetch('/api/domains/quote', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ domain }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error?.message || 'Quote failed');

        if (!data.available) {
            quoteEl.className = 'quote shown';
            if (data.premium) {
                quoteEl.innerHTML = `<div class="quote-row"><span>${data.domain}</span><span class="muted">Premium domain ($${data.premiumPrice || '???'}) — contact support to register</span></div>`;
            } else {
                quoteEl.innerHTML = `<div class="quote-row"><span>${data.domain}</span><span class="muted">Not available — try a different name</span></div>`;
            }
            return;
        }

        currentQuote = data;
        quoteEl.className = 'quote shown';
        quoteEl.innerHTML = `
            <div class="quote-row"><span>${data.domain} (1 year)</span><span class="muted">Available</span></div>
            <div class="quote-row"><span class="muted">Namecheap wholesale</span><span>$${data.wholesalePriceUsd.toFixed(2)}</span></div>
            <div class="quote-row"><span class="muted">WordToSite service fee (${data.markupPercent}%)</span><span>$${data.markupUsd.toFixed(2)}</span></div>
            <div class="quote-row total"><span>Total today</span><span>$${data.totalPriceUsd.toFixed(2)}</span></div>
            <div style="margin-top:14px"><button class="btn btn-primary" id="payBtn">Pay $${data.totalPriceUsd.toFixed(2)} and register</button></div>
            <p class="muted" style="margin-top:10px">You'll be redirected to Stripe Checkout. If domain registration fails after payment, you're refunded automatically.</p>
        `;
        document.getElementById('payBtn').addEventListener('click', purchase);
    } catch (err) {
        showBanner('error', err.message);
    }
    btn.disabled = false;
    btn.textContent = 'Check price';
}

async function purchase() {
    if (!currentQuote) return;
    const btn = document.getElementById('payBtn');
    btn.disabled = true;
    btn.textContent = 'Redirecting…';
    try {
        const res = await fetch('/api/domains/purchase', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ domain: currentQuote.domain }),
        });
        const data = await res.json();
        if (!res.ok) {
            if (data.error?.upgradeRequired) {
                showBanner('warn', `${data.error.message} `);
                btn.disabled = false;
                btn.textContent = `Pay $${currentQuote.totalPriceUsd.toFixed(2)} and register`;
                return;
            }
            throw new Error(data.error?.message || 'Purchase failed');
        }
        location.href = data.url;
    } catch (err) {
        showBanner('error', err.message);
        btn.disabled = false;
        btn.textContent = `Pay $${currentQuote.totalPriceUsd.toFixed(2)} and register`;
    }
}

async function loadDomains() {
    const el = document.getElementById('domainsList');
    try {
        const res = await fetch('/api/domains');
        if (!res.ok) throw new Error('Failed to load domains');
        const { domains } = await res.json();
        if (!domains.length) {
            el.textContent = 'No domains yet. Search above to register one.';
            return;
        }
        const rows = domains.map(d => {
            const expires = d.expiresAt ? new Date(d.expiresAt).toLocaleDateString() : '—';
            const charged = d.totalChargedCents != null ? `$${(d.totalChargedCents / 100).toFixed(2)}` : '—';
            return `<tr>
                <td>${d.domain}</td>
                <td><span class="badge badge-${d.status}">${d.status.replace('_', ' ')}</span></td>
                <td>${charged}</td>
                <td>${expires}</td>
            </tr>`;
        }).join('');
        el.innerHTML = `<table>
            <thead><tr><th>Domain</th><th>Status</th><th>Paid</th><th>Expires</th></tr></thead>
            <tbody>${rows}</tbody>
        </table>`;
    } catch (err) {
        el.textContent = err.message;
    }
}

async function init() {
    if (!(await checkAuth())) return;
    const params = new URLSearchParams(location.search);
    if (params.get('status') === 'cancelled') {
        showBanner('warn', 'Domain purchase cancelled. No charges were made.');
    }
    const sessionId = params.get('session_id');
    if (sessionId) {
        await showSessionResult(sessionId);
    } else {
        await loadDomains();
    }
}

document.getElementById('quoteBtn').addEventListener('click', getQuote);
document.getElementById('domainInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') getQuote();
});

init();
</script>
</body>
</html>
