<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>word→site | Domains</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Geist:wght@400;450;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/wts.css?v=2">
    <style>
        .quote { margin-top: 16px; padding: 16px; border-radius: var(--r-md); background: var(--bg-2); border: 1px solid var(--line); display: none; }
        .quote.shown { display: block; }
        .quote-row { display: flex; justify-content: space-between; font-size: 13.5px; padding: 4px 0; }
        .quote-row.total { font-weight: 500; border-top: 1px solid var(--line); margin-top: 8px; padding-top: 10px; font-family: var(--serif); font-size: 16px; }
        .quote-row .muted { color: var(--muted); }
        .banner { padding: 12px 14px; border-radius: var(--r-md); font-size: 13px; margin-bottom: 16px; display: none; }
        .banner.shown { display: block; }
        .banner.success { background: rgba(26,127,63,0.08); color: var(--success); border: 1px solid rgba(26,127,63,0.2); }
        .banner.warn { background: rgba(184,110,0,0.08); color: var(--warn); border: 1px solid rgba(184,110,0,0.2); }
        .banner.error { background: rgba(180,35,24,0.06); color: var(--danger); border: 1px solid rgba(180,35,24,0.2); }
        .banner.info { background: var(--accent-bg); color: var(--accent); border: 1px solid rgba(23,51,209,0.18); }
    </style>
</head>
<body class="wts">
<div class="wts-shell">
    <div id="wts-sidebar-mount"></div>

    <div class="wts-shell-main">
        <div class="wts-top">
            <div class="wts-crumbs">
                <span id="crumbUser">Account</span>
                <span class="sep">/</span>
                <b>Domains</b>
            </div>
        </div>

        <div class="wts-content">
            <div style="padding: 32px 36px 60px; max-width: 1080px;">
                <div style="margin-bottom: 28px;">
                    <h1 class="wts-page-title">Domains</h1>
                    <p class="wts-page-lede">Register a custom domain for your site. You pay Namecheap's wholesale price plus a 20% service fee — no recurring platform charge for the domain itself.</p>
                </div>

                <div class="banner" id="banner"></div>

                <div class="wts-card" style="margin-bottom:16px;">
                    <div class="wts-card-head">
                        <span class="wts-card-title">Add a custom domain</span>
                    </div>
                    <div class="wts-card-body">
                        <div class="wts-field">
                            <label class="wts-field-label">Domain</label>
                            <div style="display:flex; gap:8px;">
                                <input class="wts-input" id="domainInput" placeholder="example.com" autocomplete="off" spellcheck="false" style="flex:1;">
                                <button class="wts-btn primary" id="quoteBtn">Check price</button>
                            </div>
                        </div>
                        <div class="quote" id="quote"></div>
                    </div>
                </div>

                <div class="wts-card">
                    <div class="wts-card-head">
                        <span class="wts-card-title">Your domains</span>
                    </div>
                    <div id="domainsList" style="padding:18px; color:var(--muted); font-size:13px;">Loading…</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/assets/wts-platform.js"></script>
<script>
let currentQuote = null;

WtsPlatform.init({ active: 'domains' }).then(init).catch(() => {});

async function readJson(res) {
    const ct = res.headers.get('content-type') || '';
    if (!ct.includes('application/json')) {
        throw new Error(
            res.status === 404
                ? 'Domain features are not configured on this deployment.'
                : `Server returned an unexpected response (${res.status}).`
        );
    }
    return res.json();
}

function showBanner(type, text) {
    const el = document.getElementById('banner');
    el.className = `banner shown ${type}`;
    el.textContent = text;
}

function hideBanner() {
    document.getElementById('banner').className = 'banner';
}

async function showSessionResult(sessionId) {
    try {
        const res = await fetch(`/api/domains/by-session/${encodeURIComponent(sessionId)}`);
        if (!res.ok) {
            showBanner('info', 'Looking up your purchase…');
            setTimeout(() => showSessionResult(sessionId), 2000);
            return;
        }
        const { domain } = await readJson(res);
        if (domain.status === 'awaiting_payment' || domain.status === 'registering') {
            showBanner('info', `Setting up ${domain.domain} — refreshing in a few seconds…`);
            setTimeout(() => showSessionResult(sessionId), 3000);
            return;
        }
        if (domain.status === 'registered') {
            showBanner('success', `${domain.domain} is registered. It can now be mapped to one of your sites.`);
        } else if (domain.status === 'failed') {
            showBanner('error', `Registration failed: ${domain.errorMessage || 'unknown error'}. Your payment was refunded.`);
        }
        await loadDomains();
    } catch (err) {
        showBanner('error', err.message || 'Status lookup failed');
    }
}

async function getQuote() {
    hideBanner();
    currentQuote = null;
    const quoteEl = document.getElementById('quote');
    quoteEl.className = 'quote';
    const domain = document.getElementById('domainInput').value.trim().toLowerCase();
    if (!domain) return;

    const btn = document.getElementById('quoteBtn');
    btn.disabled = true;
    btn.textContent = 'Checking…';
    try {
        const res = await fetch('/api/domains/quote', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ domain }),
        });
        const data = await readJson(res);
        if (!res.ok) throw new Error(data.error?.message || 'Quote failed');

        if (!data.available) {
            quoteEl.className = 'quote shown';
            if (data.premium) {
                quoteEl.innerHTML = `<div class="quote-row"><span>${escapeHtml(data.domain)}</span><span class="muted">Premium domain ($${data.premiumPrice || '???'}) — contact support to register</span></div>`;
            } else {
                quoteEl.innerHTML = `<div class="quote-row"><span>${escapeHtml(data.domain)}</span><span class="muted">Not available — try a different name</span></div>`;
            }
            return;
        }

        currentQuote = data;
        quoteEl.className = 'quote shown';
        quoteEl.innerHTML = `
            <div class="quote-row"><span>${escapeHtml(data.domain)} (1 year)</span><span class="muted">Available</span></div>
            <div class="quote-row"><span class="muted">Namecheap wholesale</span><span class="wts-mono">$${data.wholesalePriceUsd.toFixed(2)}</span></div>
            <div class="quote-row"><span class="muted">word→site service fee (${data.markupPercent}%)</span><span class="wts-mono">$${data.markupUsd.toFixed(2)}</span></div>
            <div class="quote-row total"><span>Total today</span><span>$${data.totalPriceUsd.toFixed(2)}</span></div>
            <div style="margin-top:14px;"><button class="wts-btn accent" id="payBtn">Pay $${data.totalPriceUsd.toFixed(2)} and register →</button></div>
            <p style="margin-top:10px; font-size:12.5px; color:var(--muted);">You'll be redirected to Stripe Checkout. If domain registration fails after payment, you're refunded automatically.</p>
        `;
        document.getElementById('payBtn').addEventListener('click', purchase);
    } catch (err) {
        showBanner('error', err.message);
    }
    btn.disabled = false;
    btn.textContent = 'Check price';
}

async function purchase() {
    if (!currentQuote) return;
    const btn = document.getElementById('payBtn');
    btn.disabled = true;
    btn.textContent = 'Redirecting…';
    try {
        const res = await fetch('/api/domains/purchase', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ domain: currentQuote.domain }),
        });
        const data = await readJson(res);
        if (!res.ok) {
            if (data.error?.upgradeRequired) {
                showBanner('warn', `${data.error.message} `);
                btn.disabled = false;
                btn.textContent = `Pay $${currentQuote.totalPriceUsd.toFixed(2)} and register →`;
                return;
            }
            throw new Error(data.error?.message || 'Purchase failed');
        }
        location.href = data.url;
    } catch (err) {
        showBanner('error', err.message);
        btn.disabled = false;
        btn.textContent = `Pay $${currentQuote.totalPriceUsd.toFixed(2)} and register →`;
    }
}

function statusBadge(status) {
    if (status === 'registered') return '<span class="wts-badge live"><span class="dot"></span>Registered</span>';
    if (status === 'awaiting_payment' || status === 'registering') return `<span class="wts-badge accent"><span class="dot"></span>${escapeHtml(status.replace('_', ' '))}</span>`;
    if (status === 'failed') return '<span class="wts-badge draft" style="color:var(--danger); border-color:rgba(180,35,24,0.2); background:rgba(180,35,24,0.06);"><span class="dot" style="background:var(--danger);"></span>Failed</span>';
    return `<span class="wts-badge archived"><span class="dot"></span>${escapeHtml(status)}</span>`;
}

async function loadDomains() {
    const el = document.getElementById('domainsList');
    try {
        const res = await fetch('/api/domains');
        if (!res.ok) throw new Error('Failed to load domains');
        const { domains } = await readJson(res);
        if (!domains.length) {
            el.textContent = 'No domains yet. Search above to register one.';
            return;
        }
        const rows = domains.map(d => {
            const expires = d.expiresAt ? new Date(d.expiresAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';
            const charged = d.totalChargedCents != null ? `$${(d.totalChargedCents / 100).toFixed(2)}` : '—';
            return `<tr>
                <td style="font-weight:500;">${escapeHtml(d.domain)}</td>
                <td>${statusBadge(d.status)}</td>
                <td class="num" style="text-align:right;">${charged}</td>
                <td style="color:var(--muted);">${expires}</td>
            </tr>`;
        }).join('');
        el.innerHTML = `<table class="wts-table">
            <thead><tr><th>Domain</th><th>Status</th><th style="text-align:right;">Paid</th><th>Expires</th></tr></thead>
            <tbody>${rows}</tbody>
        </table>`;
        el.style.padding = '0';
    } catch (err) {
        el.textContent = err.message;
    }
}

function escapeHtml(str) {
    if (str === null || str === undefined) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function init() {
    const params = new URLSearchParams(location.search);
    if (params.get('status') === 'cancelled') {
        showBanner('warn', 'Domain purchase cancelled. No charges were made.');
    }
    const sessionId = params.get('session_id');
    if (sessionId) {
        await showSessionResult(sessionId);
    } else {
        await loadDomains();
    }
}

document.getElementById('quoteBtn').addEventListener('click', getQuote);
document.getElementById('domainInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') getQuote();
});
</script>
</body>
</html>
