<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>word→site | Plans</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Geist:wght@400;450;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/wts.css?v=2">
    <style>
        .msg { padding: 12px 14px; border-radius: var(--r-md); font-size: 13px; margin-bottom: 20px; display: none; }
        .msg.error { display: block; background: rgba(180,35,24,0.06); color: var(--danger); border: 1px solid rgba(180,35,24,0.2); }
        .msg.info { display: block; background: var(--accent-bg); color: var(--accent); border: 1px solid rgba(23,51,209,0.18); }
        .plan-card { background: var(--surface); border: 1px solid var(--line); border-radius: 8px; padding: 0; position: relative; display: flex; flex-direction: column; }
        .plan-card.selected { border-color: var(--ink); box-shadow: 0 0 0 1px var(--ink); }
        .plan-tag { position: absolute; top: -1px; right: 20px; background: var(--ink); color: var(--bg); padding: 4px 10px; font-size: 11px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; font-family: var(--mono); border-radius: 0 0 4px 4px; }
        .plan-tag.popular { background: var(--accent); color: #fff; }
        .plan-head { padding: 24px 28px 18px; border-bottom: 1px solid var(--line); }
        .plan-name { font-family: var(--serif); font-weight: 500; font-size: 26px; letter-spacing: -0.015em; }
        .plan-tagline { font-size: 12.5px; color: var(--muted); margin-top: 2px; }
        .plan-price-row { display: flex; align-items: baseline; gap: 6px; margin-top: 18px; }
        .plan-price { font-family: var(--serif); font-weight: 500; font-size: 42px; line-height: 1; letter-spacing: -0.02em; }
        .plan-price .currency { font-size: 22px; font-weight: 500; }
        .plan-per { font-size: 12.5px; color: var(--muted); }
        .plan-feats { padding: 20px 28px; flex: 1; }
        .plan-feats ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 9px; }
        .plan-feats li { display: flex; align-items: flex-start; gap: 9px; font-size: 13.5px; }
        .plan-feats li svg { flex-shrink: 0; margin-top: 3px; }
        .plan-cta { padding: 18px 28px 24px; }
    </style>
</head>
<body class="wts">
<div class="wts-shell">
    <div id="wts-sidebar-mount"></div>

    <div class="wts-shell-main">
        <div class="wts-top">
            <div class="wts-crumbs">
                <span id="crumbUser">Account</span>
                <span class="sep">/</span>
                <span>Account</span>
                <span class="sep">/</span>
                <b>Plans</b>
            </div>
        </div>

        <div class="wts-content">
            <div class="account-subnav">
                <div class="account-subnav-inner">
                    <a href="/profile.html">Profile</a>
                    <a href="/billing.html">Billing</a>
                    <a href="/usage.html">Usage</a>
                    <a href="/pricing.html" class="active">Plans</a>
                </div>
            </div>

            <div style="padding: 32px 36px 60px; max-width: 1280px;">
                <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:28px; gap:24px;">
                    <div>
                        <h1 class="wts-page-title">Plans</h1>
                        <p class="wts-page-lede">Pay for what you ship. Switch or cancel any time — prorated to the day.</p>
                    </div>
                </div>

                <div class="msg" id="msg"></div>

                <div id="plans" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(240px, 1fr)); gap:16px; margin-bottom:32px;"></div>

                <p style="font-size:12.5px; color:var(--muted-2); text-align:center;">
                    Prices in USD, billed monthly. All paid plans include the customer portal — switch tiers or cancel anytime.
                    Questions? See our <a href="/terms.html" style="color:var(--accent);">terms</a> or <a href="/docs.html" style="color:var(--accent);">docs</a>.
                </p>
            </div>
        </div>
    </div>
</div>

<script src="/assets/wts-platform.js"></script>
<script>
const PLAN_ORDER = ['free', 'starter', 'pro', 'business'];
const FEATURED = 'pro';
let currentUser = null;

WtsPlatform.init({ active: 'pricing' }).then(user => {
    currentUser = user;
    loadPlans();
}).catch(() => {});

function fmtNumber(n) {
    if (n >= 1_000_000) return (n / 1_000_000).toFixed(n % 1_000_000 === 0 ? 0 : 1) + 'M';
    if (n >= 1_000) return (n / 1_000).toFixed(n % 1_000 === 0 ? 0 : 1) + 'K';
    return String(n);
}

function featureLines(plan) {
    const lines = [];
    lines.push(`${plan.maxSites} site${plan.maxSites > 1 ? 's' : ''}`);
    if (plan.customDomain === false) lines.push('Subdomain on wts.ai only');
    else if (plan.customDomain === 'byod') lines.push('Bring your own domain');
    else lines.push('Buy custom domains (wholesale + 20%)');
    lines.push(`${fmtNumber(plan.monthlyTokens)} AI tokens / month`);
    lines.push(`${plan.voicePerDay} voice / day`);
    if (plan.watermark) lines.push('WordToSite badge in footer');
    else lines.push('No platform branding');
    return lines;
}

function checkIcon(color) {
    return `<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="${color}" stroke-width="1.6"><path d="M3 8l3.5 3.5L13 5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

async function loadPlans() {
    try {
        const plansRes = await fetch('/api/billing/plans');

        if (!plansRes.ok) {
            const status = plansRes.status;
            if (status === 404) {
                showInfo('Billing is not enabled on this deployment. Set STRIPE_SECRET_KEY in .env to activate.');
                return;
            }
            throw new Error('Failed to load plans');
        }

        const { plans } = await plansRes.json();
        const byTier = Object.fromEntries(plans.map(p => [p.tier, p]));
        const ordered = PLAN_ORDER.map(t => byTier[t]).filter(Boolean);

        const root = document.getElementById('plans');
        root.innerHTML = '';
        for (const plan of ordered) {
            const isCurrent = currentUser && currentUser.planTier === plan.tier;
            const featured = plan.tier === FEATURED;
            const canSubscribe = plan.tier !== 'free' && plan.priceId && !isCurrent;

            const card = document.createElement('div');
            card.className = 'plan-card' + (isCurrent ? ' selected' : '');
            const tag = isCurrent
                ? '<span class="plan-tag">Your plan</span>'
                : featured ? '<span class="plan-tag popular">Most popular</span>' : '';
            const cta = isCurrent
                ? '<a class="wts-btn lg" href="/billing.html" style="width:100%; justify-content:center;">Current plan</a>'
                : plan.tier === 'free'
                    ? '<a class="wts-btn lg" href="/dashboard.html" style="width:100%; justify-content:center;">Use free plan</a>'
                    : canSubscribe
                        ? `<button class="wts-btn primary lg" data-tier="${plan.tier}" style="width:100%; justify-content:center;">Subscribe →</button>`
                        : '<button class="wts-btn lg" disabled style="width:100%; justify-content:center;">Unavailable</button>';

            const checkColor = isCurrent ? 'var(--accent)' : 'var(--ink)';
            const features = featureLines(plan).map(f =>
                `<li>${checkIcon(checkColor)}<span>${f}</span></li>`
            ).join('');

            card.innerHTML = `
                ${tag}
                <div class="plan-head">
                    <div class="plan-name">${plan.label}</div>
                    <div class="plan-tagline">${plan.tagline || plan.description || (plan.tier === 'free' ? 'For trying things out' : '')}</div>
                    <div class="plan-price-row">
                        <div class="plan-price"><span class="currency">$</span>${plan.monthlyPriceUsd}</div>
                        <div class="plan-per">per month</div>
                    </div>
                </div>
                <div class="plan-feats"><ul>${features}</ul></div>
                <div class="plan-cta">${cta}</div>
            `;
            root.appendChild(card);
        }

        root.querySelectorAll('button[data-tier]').forEach(btn => {
            btn.addEventListener('click', () => subscribe(btn.dataset.tier, btn));
        });
    } catch (err) {
        showError(err.message || 'Failed to load pricing.');
    }
}

async function subscribe(planTier, btn) {
    btn.disabled = true;
    btn.textContent = 'Redirecting…';
    try {
        const res = await fetch('/api/billing/checkout', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ planTier }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error?.message || 'Checkout failed');
        window.location.href = data.url;
    } catch (err) {
        showError(err.message);
        btn.disabled = false;
        btn.textContent = 'Subscribe →';
    }
}

function showError(text) {
    const el = document.getElementById('msg');
    el.className = 'msg error';
    el.textContent = text;
}

function showInfo(text) {
    const el = document.getElementById('msg');
    el.className = 'msg info';
    el.textContent = text;
}
</script>
</body>
</html>
