<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>word→site | Usage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Geist:wght@400;450;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/wts.css?v=2">
    <style>
        .loading-state { text-align: center; padding: 60px; color: var(--muted); font-size: 14px; }
    </style>
</head>
<body class="wts">
<div class="wts-shell">
    <div id="wts-sidebar-mount"></div>

    <div class="wts-shell-main">
        <div class="wts-top">
            <div class="wts-crumbs">
                <span id="crumbUser">Account</span>
                <span class="sep">/</span>
                <span>Account</span>
                <span class="sep">/</span>
                <b>Usage</b>
            </div>
            <div style="display:flex; gap:6px; align-items:center;" id="siteSelectorWrap">
                <span style="font-size:12px; color:var(--muted);">Site:</span>
                <select id="siteSelect" class="wts-input" style="height:30px; min-width:200px; padding:0 28px 0 10px; font-size:13px;"></select>
            </div>
        </div>

        <div class="wts-content">
            <div class="account-subnav">
                <div class="account-subnav-inner">
                    <a href="/profile.html">Profile</a>
                    <a href="/billing.html">Billing</a>
                    <a href="/usage.html" class="active">Usage</a>
                    <a href="/pricing.html">Plans</a>
                </div>
            </div>

            <div style="padding: 32px 36px 60px; max-width: 1080px;">
                <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:24px; gap:24px;">
                    <div>
                        <h1 class="wts-page-title">Usage</h1>
                        <p class="wts-page-lede">AI proxy token usage this month. Hourly refresh.</p>
                    </div>
                </div>

                <div id="content">
                    <div class="loading-state">Loading usage data…</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/assets/wts-platform.js"></script>
<script>
let allSites = [];
let usageCache = {};

WtsPlatform.init({ active: 'usage' }).then(loadUsage).catch(() => {});

function formatTokens(n) {
    if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
    if (n >= 1_000) return (n / 1_000).toFixed(1) + 'K';
    return n.toString();
}

function esc(str) {
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
}

function getDomain(site) {
    try { return site.wp_url ? new URL(site.wp_url).hostname : site.domain || null; }
    catch { return site.domain || null; }
}

function getSiteName(site) {
    return site.site_name || site.siteName || site.domain || 'Unnamed site';
}

async function fetchUsage(siteId) {
    if (usageCache[siteId]) return usageCache[siteId];
    try {
        const res = await fetch(`/api/sites/${siteId}/usage`);
        const data = await res.json();
        usageCache[siteId] = data.usage || null;
        return usageCache[siteId];
    } catch {
        return null;
    }
}

function renderUsage(site, usage) {
    const container = document.getElementById('content');
    const domain = getDomain(site) || '—';

    if (!usage) {
        container.innerHTML = `
            <div class="wts-card">
                <div class="wts-card-head">
                    <span class="wts-card-title">${esc(getSiteName(site))}</span>
                    <span class="wts-mono" style="font-size:12px; color:var(--muted);">${esc(domain)}</span>
                </div>
                <div class="wts-card-body" style="text-align:center; padding:48px 24px; color:var(--muted-2);">
                    <div style="font-size:14px;">No usage data yet</div>
                    <div style="font-size:12px; margin-top:6px;">AI proxy key will be registered automatically when your site is deployed.</div>
                </div>
            </div>`;
        return;
    }

    const used = usage.tokensUsed || 0;
    const limit = usage.tokenLimit || 0;
    const pct = limit > 0 ? (used / limit) * 100 : 0;
    const barPct = Math.min(pct, 100);
    const barColor = pct > 90 ? 'var(--danger)' : pct > 70 ? 'var(--warn)' : 'var(--ink)';
    const status = usage.status || 'active';
    const statusBadge = status === 'active'
        ? '<span class="wts-badge live"><span class="dot"></span>Active</span>'
        : '<span class="wts-badge archived"><span class="dot"></span>' + esc(status) + '</span>';

    container.innerHTML = `
        <div class="wts-card" style="margin-bottom:16px;">
            <div style="display:grid; grid-template-columns:repeat(4, 1fr);">
                <div style="padding:20px 22px; border-right:1px solid var(--line);">
                    <div style="font-size:11.5px; color:var(--muted); text-transform:uppercase; letter-spacing:0.04em;">Tokens used</div>
                    <div style="display:flex; align-items:baseline; gap:6px; margin-top:6px;">
                        <div class="wts-serif" style="font-size:36px;">${formatTokens(used)}</div>
                        <div style="font-size:12px; color:var(--muted);">/ ${formatTokens(limit)}</div>
                    </div>
                    <div style="margin-top:6px; height:4px; background:var(--bg-3); border-radius:2px;">
                        <div style="width:${barPct.toFixed(1)}%; height:100%; background:${barColor}; border-radius:2px;"></div>
                    </div>
                </div>
                <div style="padding:20px 22px; border-right:1px solid var(--line);">
                    <div style="font-size:11.5px; color:var(--muted); text-transform:uppercase; letter-spacing:0.04em;">Usage</div>
                    <div class="wts-serif" style="font-size:36px; margin-top:6px;">${pct.toFixed(1)}%</div>
                    <div style="font-size:12px; color:var(--muted); margin-top:2px;">of monthly limit</div>
                </div>
                <div style="padding:20px 22px; border-right:1px solid var(--line);">
                    <div style="font-size:11.5px; color:var(--muted); text-transform:uppercase; letter-spacing:0.04em;">Remaining</div>
                    <div class="wts-serif" style="font-size:36px; margin-top:6px;">${formatTokens(Math.max(0, limit - used))}</div>
                    <div style="font-size:12px; color:var(--muted); margin-top:2px;">tokens left</div>
                </div>
                <div style="padding:20px 22px;">
                    <div style="font-size:11.5px; color:var(--muted); text-transform:uppercase; letter-spacing:0.04em;">Period</div>
                    <div class="wts-serif" style="font-size:22px; margin-top:6px;">${esc(usage.period || '—')}</div>
                    <div style="margin-top:8px;">${statusBadge}</div>
                </div>
            </div>
        </div>

        <div class="wts-card">
            <div class="wts-card-head">
                <span class="wts-card-title">${esc(getSiteName(site))}</span>
                <span class="wts-mono" style="font-size:12px; color:var(--muted);">${esc(domain)}</span>
            </div>
            <table class="wts-table">
                <tbody>
                    <tr><td style="color:var(--muted); width:200px;">Status</td><td>${statusBadge}</td></tr>
                    <tr><td style="color:var(--muted);">Period</td><td>${esc(usage.period || '—')}</td></tr>
                    <tr><td style="color:var(--muted);">Tokens used</td><td class="num">${used.toLocaleString()}</td></tr>
                    <tr><td style="color:var(--muted);">Token limit</td><td class="num">${limit.toLocaleString()}</td></tr>
                    <tr><td style="color:var(--muted);">Remaining</td><td class="num">${Math.max(0, limit - used).toLocaleString()}</td></tr>
                </tbody>
            </table>
        </div>`;
}

async function selectSite(siteId) {
    const container = document.getElementById('content');
    const site = allSites.find(s => s.id === siteId);
    if (!site) return;

    container.innerHTML = '<div class="loading-state">Loading usage…</div>';
    const usage = await fetchUsage(siteId);
    renderUsage(site, usage);
}

async function loadUsage() {
    const container = document.getElementById('content');
    document.getElementById('siteSelectorWrap').style.display = 'none';

    try {
        const res = await fetch('/api/sites');
        const data = await res.json();
        allSites = (data.sites || []).filter(s => s.wp_url || s.domain);
    } catch {
        container.innerHTML = '<div class="wts-card" style="padding:24px; text-align:center; color:var(--danger);">Failed to load sites.</div>';
        return;
    }

    if (allSites.length === 0) {
        container.innerHTML = '<div class="wts-card" style="padding:48px 24px; text-align:center; color:var(--muted);">No sites with domains yet. Create your first site from the <a href="/dashboard.html" style="color:var(--accent);">dashboard</a>.</div>';
        return;
    }

    const select = document.getElementById('siteSelect');
    select.innerHTML = '';
    for (const site of allSites) {
        const opt = document.createElement('option');
        opt.value = site.id;
        opt.textContent = getSiteName(site);
        select.appendChild(opt);
    }

    document.getElementById('siteSelectorWrap').style.display = '';
    select.addEventListener('change', () => selectSite(select.value));

    await selectSite(allSites[0].id);
}
</script>
</body>
</html>
